name: ci

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit + contract tests
        run: pnpm test
      - name: Format check
        run: pnpm format:check
      - name: Build
        run: pnpm build
      - name: Bundle size budget
        run: pnpm -F frontend size

  e2e:
    runs-on: ubuntu-latest
    needs: gates
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm -F frontend exec playwright install --with-deps chromium
      - name: Build
        run: pnpm build
      - name: E2E
        run: pnpm test:e2e
      - name: Upload Playwright report on failure
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
