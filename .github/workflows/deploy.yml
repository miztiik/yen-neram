name: deploy

# Publish to GitHub Pages only AFTER ci passes on main, so a red commit never
# reaches the live site. The deploy is decoupled from the raw push event and
# keyed to the ci workflow's conclusion (see ci.yml). workflow_dispatch is a
# manual escape hatch to re-publish the current main without a new commit.
on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # Gate: a workflow_run trigger must carry a successful ci conclusion; a
    # manual dispatch is an explicit human action and always proceeds.
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Build the exact commit ci validated (head_sha); fall back to the
          # dispatched ref for a manual re-publish.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        env:
          GH_PAGES_BASE: /${{ github.event.repository.name }}/
        run: pnpm build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
